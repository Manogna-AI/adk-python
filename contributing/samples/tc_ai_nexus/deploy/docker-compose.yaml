services:
  tc-ai-nexus:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TC_AI_MODEL=${TC_AI_MODEL:-openai/gpt-5.3}
      # Optional MCP server configs as JSON string.
      - TC_AI_MCP_STDIO_JSON=${TC_AI_MCP_STDIO_JSON:-}
    ports:
      - "7860:7860"
    depends_on:
      - qdrant

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  qdrant_data:
